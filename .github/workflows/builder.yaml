name: Builder
run-name: Builder (${{ inputs.app }})

on:
  workflow_dispatch:
    inputs:
      app:
        description: app slug
        required: true
        type: string
      version:
        description: app version
        required: true
        type: string
      artifact_url:
        description: app artifact url
        required: true
        type: string

# Serialize builds per app: a newer build cancels a superseded in-flight one so
# the newest dispatched version wins the config.yaml pointer (not last-to-finish).
concurrency:
  group: builder-${{ inputs.app }}
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    name: Prepare ${{ inputs.app }} app
    outputs:
      architectures: ${{ steps.info.outputs.architectures }}
      build_matrix: ${{ steps.matrix.outputs.matrix }}
      image_name: ${{ steps.normalize.outputs.image_name }}
      registry_prefix: ${{ steps.normalize.outputs.registry_prefix }}
      name: ${{ steps.normalize.outputs.name }}
      description: ${{ steps.normalize.outputs.description }}
      url: ${{ steps.normalize.outputs.url }}
      package_names: ${{ steps.normalize.outputs.package_names }}
    permissions:
      contents: read

    steps:
      - name: Check out the repository
        uses: actions/checkout@v7.0.1

      - name: Get information
        id: info
        uses: home-assistant/actions/helpers/info@e3fb68ebda13d88a0d695082f471ba2c83d025fb # master
        with:
          path: "./${{ inputs.app }}"

      - name: Normalize app information
        id: normalize
        env:
          IMAGE: ${{ steps.info.outputs.image }}
          ARCHITECTURES: ${{ steps.info.outputs.architectures }}
          NAME: ${{ steps.info.outputs.name }}
          DESCRIPTION: ${{ steps.info.outputs.description }}
          URL: ${{ steps.info.outputs.url }}
        run: |
          # The info helper emits scalars JSON-encoded (yq -o=json), i.e. wrapped
          # in literal double quotes. Decode with jq -r before use, or the quotes
          # end up baked into the image reference and break the build.
          image=$(jq -r . <<< "${IMAGE}")
          name=$(jq -r . <<< "${NAME}")
          description=$(jq -r . <<< "${DESCRIPTION}")
          url=$(jq -r . <<< "${URL}")
          image_name=${image##*/}
          echo "image_name=${image_name}" >> "$GITHUB_OUTPUT"
          echo "registry_prefix=${image%/*}" >> "$GITHUB_OUTPUT"
          echo "name=${name}" >> "$GITHUB_OUTPUT"
          echo "description=${description}" >> "$GITHUB_OUTPUT"
          if [[ -n "$url" && "$url" != "null" ]]; then
            echo "url=${url}" >> "$GITHUB_OUTPUT"
          fi
          # Per-arch package repos ("<arch>-<name>") plus the multi-arch manifest
          # repo ("<name>"), for the cleanup job to prune.
          package_names=$(jq -c --arg name "$image_name" \
            '[.[] | "\(.)-\($name)"] + [$name]' <<< "${ARCHITECTURES}")
          echo "package_names=${package_names}" >> "$GITHUB_OUTPUT"

      - name: Prepare build matrix
        id: matrix
        uses: home-assistant/builder/actions/prepare-multi-arch-matrix@2026.06.0
        with:
          architectures: ${{ steps.info.outputs.architectures }}
          image-name: ${{ steps.normalize.outputs.image_name }}
          registry-prefix: ${{ steps.normalize.outputs.registry_prefix }}

  build:
    runs-on: ${{ matrix.os }}
    name: Build ${{ inputs.app }} app (${{ matrix.arch }})
    needs: prepare
    permissions:
      contents: read
      id-token: write
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.build_matrix) }}

    steps:
      - name: Check out the repository
        uses: actions/checkout@v7.0.1
        with:
          persist-credentials: false

      - name: Unpack artifact
        run: |
          cd ./${{ inputs.app }}
          wget -O artifact.tar.gz "${{ inputs.artifact_url }}"
          tar -zxvf artifact.tar.gz --strip-components=1 -C rootfs

      - name: Build ${{ inputs.app }} app
        uses: home-assistant/builder/actions/build-image@2026.06.0
        with:
          arch: ${{ matrix.arch }}
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          context: "./${{ inputs.app }}"
          image: ${{ matrix.image }}
          image-tags: ${{ inputs.version }}
          cache-gha-scope: ${{ inputs.app }}-${{ matrix.arch }}
          labels: |
            io.hass.type=app
            io.hass.name=${{ needs.prepare.outputs.name }}
            io.hass.description=${{ needs.prepare.outputs.description }}
            ${{ needs.prepare.outputs.url && format('io.hass.url={0}', needs.prepare.outputs.url) || '' }}
          push: true
          version: ${{ inputs.version }}

  manifest:
    runs-on: ubuntu-latest
    name: Publish ${{ inputs.app }} multi-arch manifest
    needs: [prepare, build]
    permissions:
      id-token: write
      packages: write

    steps:
      - name: Publish multi-arch manifest
        uses: home-assistant/builder/actions/publish-multi-arch-manifest@2026.06.0
        with:
          architectures: ${{ needs.prepare.outputs.architectures }}
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          image-name: ${{ needs.prepare.outputs.image_name }}
          image-tags: ${{ inputs.version }}
          registry-prefix: ${{ needs.prepare.outputs.registry_prefix }}

  finalize:
    runs-on: ubuntu-latest
    name: Commit ${{ inputs.app }} version
    needs: manifest
    permissions:
      contents: write

    steps:
      - name: Check out the repository
        uses: actions/checkout@v7.0.1

      - name: Set version
        run: |
          yq e '.version = "${{ inputs.version }}"' -i ./${{ inputs.app }}/config.yaml

      - name: Commit version
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ./${{ inputs.app }}/config.yaml
          git commit -m "New ${{ inputs.app }} build (${{ inputs.version }})" || exit 0
          # Same-app builds are serialized by the concurrency group, so a rebase
          # can only ever meet another app's file (no conflict). Retry covers the
          # thin window where that other app pushes between our pull and push.
          for attempt in $(seq 1 5); do
            git pull --rebase && git push && exit 0
            echo "Push lost a race, retrying..."
            sleep $((RANDOM % 5 + 2))
          done
          exit 1

  cleanup:
    runs-on: ubuntu-latest
    name: Cleanup ${{ inputs.app }} package ${{ matrix.package }}
    needs: [prepare, manifest]
    strategy:
      matrix:
        package: ${{ fromJSON(needs.prepare.outputs.package_names) }}
    permissions:
      packages: write

    steps:
      - name: Cleanup untagged packages
        uses: actions/delete-package-versions@v5.0.0
        with:
          package-name: ${{ matrix.package }}
          package-type: container
          min-versions-to-keep: 0
          delete-only-untagged-versions: true

      - name: Cleanup old packages
        uses: actions/delete-package-versions@v5.0.0
        with:
          package-name: ${{ matrix.package }}
          package-type: container
          min-versions-to-keep: 6
          ignore-versions: ${{ inputs.version }}
